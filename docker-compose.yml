version: "3.9"

services:
  backend:
    image: python:3.11
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./data:/data
    command: sh -c "pip install fastapi uvicorn && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:5173"
